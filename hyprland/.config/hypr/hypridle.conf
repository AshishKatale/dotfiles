general {
  lock_cmd = pidof hyprlock || hyprlock
  before_sleep_cmd = loginctl lock-session
  after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
  timeout = 120
  on-timeout = brightnessctl get > /tmp/session_brightness && brightnessctl set 5%
  on-resume = brightnessctl set "$(cat /tmp/session_brightness 2> /dev/null)" || brightnessctl set 25%
}

listener {
  timeout = 150
  on-timeout = loginctl lock-session
}

listener {
  timeout = 180
  on-timeout = hyprctl dispatch dpms off
  on-resume = hyprctl dispatch dpms on
}
