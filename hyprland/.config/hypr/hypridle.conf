general {
  lock_cmd = pidof hyprlock || hyprlock
  before_sleep_cmd = loginctl lock-session
  after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
  timeout = 150
  on-timeout = brightnessctl get > /tmp/${USER}_brightness && brightnessctl set 5%
  on-resume = if [ -f /tmp/${USER}_brightness ]; then brightnessctl set $(cat /tmp/${USER}_brightness); else brightnessctl set 30%; fi
}

listener {
  timeout = 180
  on-timeout = hyprctl dispatch dpms off
  on-resume = hyprctl dispatch dpms on
}

listener {
  timeout = 300
  on-timeout = loginctl lock-session
}
